name: Release

# Every push/merge to main builds, signs, and publishes a new desktop release.
# The version is auto-incremented (patch bump) from the latest git tag and baked
# into each build so the in-app updater (served by the Cloudflare Worker) can
# compare versions correctly.
on:
  push:
    branches:
      - main

# Allow creating the git tag, GitHub Release, and uploading assets.
permissions:
  contents: write

# Serialize releases so concurrent pushes don't compute the same version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: bump
        shell: bash
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="0.1.0"
            echo "[release] no existing tag, starting at $next"
          else
            v=${latest#v}
            IFS='.' read -r major minor patch <<< "$v"
            patch=$((patch + 1))
            next="${major}.${minor}.${patch}"
            echo "[release] latest tag $latest -> next $next"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm i

      - name: Apply computed version
        shell: bash
        run: node scripts/set-version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing keys generated with `tauri signer generate`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- Optional macOS code signing + notarization (recommended for distribution) ---
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v${{ needs.prepare.outputs.version }}
          releaseName: "Immich Local App v${{ needs.prepare.outputs.version }}"
          releaseBody: "Automated release from main. See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
